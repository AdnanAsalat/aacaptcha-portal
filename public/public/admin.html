<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AACaptcha Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050510;--card:#0d0d24;--border:#1a1a3e;--accent:#6c3aed;--text:#e2e0f5;--muted:#6b6890;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;width:320px;text-align:center}
.login-box h1{font-size:18px;font-weight:700;margin-bottom:20px;background:linear-gradient(135deg,#a78bfa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
input{width:100%;background:#0a0a1e;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;margin-bottom:10px}
input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.btn:hover{opacity:.85}
.bp{background:linear-gradient(135deg,#6c3aed,#3b82f6);color:#fff;width:100%;padding:10px}
.bg{background:var(--card);border:1px solid var(--border);color:#a78bfa}
.br{background:var(--red);color:#fff}
.bam{background:var(--amber);color:#000}
.bgrn{background:var(--green);color:#fff}
.app{display:none;flex-direction:column;height:100vh}
.app.show{display:flex}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px}
.header h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.hstats{display:flex;gap:16px}
.hs{text-align:center}
.hsv{font-size:20px;font-weight:700;color:#a78bfa;line-height:1}
.hsl{font-size:9px;color:var(--muted)}
.tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 20px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#a78bfa;border-bottom-color:var(--accent)}
.panes{flex:1;overflow-y:auto;padding:20px}
.order-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.order-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.order-name{font-size:14px;font-weight:700;flex:1}
.order-amount{font-size:18px;font-weight:700;color:#a78bfa}
.order-details{font-size:12px;color:var(--muted);line-height:1.8}
.order-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.badge{padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700}
.badge-pending{background:rgba(245,158,11,.2);color:var(--amber)}
.badge-approved{background:rgba(34,197,94,.2);color:var(--green)}
.badge-rejected{background:rgba(239,68,68,.2);color:var(--red)}
.client-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px}
.client-top{display:flex;align-items:center;gap:10px}
.client-name{font-size:13px;font-weight:700;flex:1}
.client-info{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.7}
.key-text{font-family:monospace;font-size:11px;color:#a78bfa;background:#0a0a1e;padding:3px 8px;border-radius:5px;word-break:break-all}
.toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 16px;border-radius:8px;font-size:12px;color:#fff}
.tok{background:#16a34a}.terr{background:#dc2626}.tinf{background:#6c3aed}
</style>
</head>
<body>
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h1>🔲 AACaptcha Admin</h1>
    <input type="password" id="ap" placeholder="Admin Password">
    <button class="btn bp" onclick="doLogin()">Login</button>
    <div id="lerr" style="color:#ef4444;font-size:12px;margin-top:8px"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <h1>🔲 AACaptcha Admin</h1>
    <div class="hstats">
      <div class="hs"><div class="hsv" id="hs-clients">0</div><div class="hsl">Clients</div></div>
      <div class="hs"><div class="hsv" id="hs-active">0</div><div class="hsl">Active</div></div>
      <div class="hs"><div class="hsv" id="hs-orders">0</div><div class="hsl">Pending</div></div>
      <div class="hs"><div class="hsv" id="hs-today">0</div><div class="hsl">Today</div></div>
    </div>
    <button class="btn bg" style="font-size:11px" onclick="loadAll()">🔄</button>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--border)">
    <button class="tab active" onclick="switchTab('orders',this)">📋 Orders</button>
    <button class="tab" onclick="switchTab('clients',this)">👥 Clients</button>
  </div>
  <div class="panes">
    <div id="pane-orders"></div>
    <div id="pane-clients" style="display:none"></div>
  </div>
</div>

<script>
let PASS = '';

async function doLogin() {
  PASS = document.getElementById('ap').value;
  const r = await fetch('/admin/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PASS})});
  const d = await r.json();
  if (d.ok) {
    localStorage.setItem('aa_admin', PASS);
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('app').classList.add('show');
    loadAll();
    setInterval(loadAll, 5000);
  } else { document.getElementById('lerr').textContent='Wrong password'; }
}

async function api(method, path, body) {
  const r = await fetch(path, {method, headers:{'Content-Type':'application/json','x-admin-pass':PASS}, body:body?JSON.stringify(body):undefined});
  return r.json();
}

async function loadAll() {
  const stats = await api('GET', '/admin/stats');
  document.getElementById('hs-clients').textContent = stats.totalClients||0;
  document.getElementById('hs-active').textContent  = stats.activeClients||0;
  document.getElementById('hs-orders').textContent  = stats.pendingOrders||0;
  document.getElementById('hs-today').textContent   = stats.tasksToday||0;
  loadOrders(); loadClients();
}

async function loadOrders() {
  const d = await api('GET', '/admin/orders');
  const orders = d.orders || [];
  const el = document.getElementById('pane-orders');
  if (!orders.length) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No orders yet</div>'; return; }
  el.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-top">
        <div class="order-name">👤 ${o.clientName}</div>
        <div class="order-amount">$${o.price}</div>
        <span class="badge badge-${o.status}">${o.status.toUpperCase()}</span>
      </div>
      <div class="order-details">
        📧 ${o.clientEmail}<br>
        📦 ${o.tasks?.toLocaleString()} tasks/day • 30 days<br>
        🔗 TX: ${o.txHash||'Not provided'}<br>
        📅 ${new Date(o.createdAt).toLocaleString()}
      </div>
      ${o.screenshot ? `<div style="margin-top:8px"><a href="/admin/screenshot/${o.screenshot}?pass=${PASS}" target="_blank" style="color:#a78bfa;font-size:12px">📸 View Screenshot</a></div>` : ''}
      ${o.status==='pending' ? `
      <div class="order-actions">
        <button class="btn bgrn" onclick="approve('${o.id}')">✅ Approve & Activate</button>
        <button class="btn br" onclick="reject('${o.id}')">❌ Reject</button>
      </div>` : o.status==='approved' ? `<div style="margin-top:8px;font-size:11px;color:var(--green)">✅ Approved: ${o.approvedAt?new Date(o.approvedAt).toLocaleString():''}</div>` : `<div style="margin-top:8px;font-size:11px;color:var(--red)">❌ Rejected</div>`}
    </div>`).join('');
}

async function loadClients() {
  const d = await api('GET', '/admin/clients-list');
  const clients = d.clients || [];
  const el = document.getElementById('pane-clients');
  if (!clients.length) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No clients yet</div>'; return; }
  el.innerHTML = clients.map(c => {
    const valid = c.planExpiry && new Date(c.planExpiry) > new Date();
    const days = c.planExpiry ? Math.ceil((new Date(c.planExpiry)-new Date())/86400000) : 0;
    return `
    <div class="client-row" id="cr-${c.id}">
      <div class="client-top">
        <div class="client-name">👤 ${c.name}</div>
        <span class="badge badge-${valid?'approved':'rejected'}">${valid?'ACTIVE':'EXPIRED'}</span>
        ${c.suspended ? '<span class="badge" style="background:rgba(239,68,68,.2);color:#ef4444">SUSPENDED</span>' : ''}
      </div>
      <div class="client-info">
        📧 ${c.email}<br>
        📦 ${c.planTasks?.toLocaleString()||'No plan'} tasks/day • ${valid ? days+'d left' : 'Expired'}<br>
        📊 Used today: ${c.usedToday||0}<br>
        ${c.apiKey ? `🔑 <span class="key-text">${c.apiKey}</span>` : '<span style="color:var(--muted)">No API key yet</span>'}
      </div>
      
      <!-- Manual Plan Activate -->
      <div style="margin-top:10px;padding:10px;background:#0a0a1e;border-radius:8px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600">MANUAL PLAN ACTIVATE</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <select id="plan-sel-${c.id}" style="background:#0a0a1e;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:11px;outline:none">
            <option value="3000">3,000 tasks - $3</option>
            <option value="5000">5,000 tasks - $5</option>
            <option value="7000">7,000 tasks - $7</option>
            <option value="10000" selected>10,000 tasks - $10</option>
            <option value="15000">15,000 tasks - $15</option>
            <option value="20000">20,000 tasks - $20</option>
            <option value="25000">25,000 tasks - $25</option>
            <option value="30000">30,000 tasks - $30</option>
            <option value="40000">40,000 tasks - $40</option>
            <option value="50000">50,000 tasks - $50</option>
            <option value="75000">75,000 tasks - $75</option>
            <option value="100000">100,000 tasks - $100</option>
          </select>
          <input id="days-sel-${c.id}" type="number" value="30" min="1" max="365" 
            style="width:60px;background:#0a0a1e;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 8px;font-size:11px;outline:none" 
            placeholder="Days">
          <span style="font-size:11px;color:var(--muted)">days</span>
          <button class="btn bgrn" style="padding:5px 10px;font-size:11px" onclick="manualActivate('${c.id}')">✅ Activate</button>
        </div>
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <button class="btn bg" style="padding:5px 10px;font-size:11px" onclick="copyToClip('${c.apiKey||''}')">📋 Copy Key</button>
        <button class="btn ${c.suspended?'bgrn':'bam'}" style="padding:5px 10px;font-size:11px" onclick="toggleSuspend('${c.id}',${!!c.suspended})">
          ${c.suspended ? '▶ Unsuspend' : '⏸ Suspend'}
        </button>
        <button class="btn br" style="padding:5px 10px;font-size:11px" onclick="deleteClient('${c.id}','${c.name}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

async function manualActivate(clientId) {
  const tasks = parseInt(document.getElementById('plan-sel-'+clientId).value);
  const days  = parseInt(document.getElementById('days-sel-'+clientId).value) || 30;
  if (!confirm(`Activate ${tasks.toLocaleString()} tasks/day for ${days} days?`)) return;
  const d = await api('POST', '/admin/manual-activate', { clientId, tasks, days });
  if (d.ok) { toast('✅ Plan activated! Key: ' + (d.apiKey||'existing'), 'ok'); loadAll(); }
  else toast('Error: ' + (d.error||'?'), 'err');
}

async function toggleSuspend(clientId, currentlySuspended) {
  const action = currentlySuspended ? 'unsuspend' : 'suspend';
  if (!confirm(`${action} this client?`)) return;
  const d = await api('POST', '/admin/suspend-client', { clientId, suspend: !currentlySuspended });
  if (d.ok) { toast(`Client ${action}ed`, 'ok'); loadAll(); }
  else toast('Error: ' + d.error, 'err');
}

async function deleteClient(clientId, name) {
  if (!confirm(`DELETE client "${name}"? This cannot be undone!`)) return;
  if (!confirm(`Are you sure? All data for "${name}" will be permanently deleted.`)) return;
  const d = await api('DELETE', '/admin/delete-client/' + clientId);
  if (d.ok) { toast('Client deleted', 'ok'); loadAll(); }
  else toast('Error: ' + d.error, 'err');
}

function copyToClip(text) {
  if (!text) { toast('No API key', 'err'); return; }
  navigator.clipboard.writeText(text);
  toast('Copied!', 'ok');
}

async function approve(orderId) {
  if (!confirm('Approve ?')) return;
  const d = await api('POST', '/admin/approve/'+orderId);
  if (d.ok) { toast('✅ Approved! Key: '+d.apiKey, 'ok'); loadAll(); }
  else toast('Error: '+(d.error||'?'), 'err');
}

async function reject(orderId) {
  if (!confirm('Reject ?')) return;
  await api('POST', '/admin/reject/'+orderId);
  toast('Rejected', 'inf'); loadAll();
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-orders').style.display = tab==='orders'?'block':'none';
  document.getElementById('pane-clients').style.display = tab==='clients'?'block':'none';
}

function toast(msg, type='inf') {
  const old=document.querySelector('.toast'); if(old) old.remove();
  const el=document.createElement('div'); el.className='toast t'+type; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
}

window.onload=()=>{
  const saved=localStorage.getItem('aa_admin');
  if(saved){PASS=saved;document.getElementById('ap').value=saved;doLogin();}
  document.getElementById('ap').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
};
</script>
</body>
</html>
